name: Labeler
on:
  pull_request_target:
    types: [opened, synchronized]
  issues:
    types: [opened, edited]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/labeler@v6
        if: github.event_name == 'pull_request_target'
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          sync-labels: true

      - name: Label Issues
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();
            const body = (issue.body || "").toLowerCase();
            const labels = [];
            
            if (title.includes("bug") || body.includes("bug") || body.includes("fehler")) {
              labels.push("bug");
            }
            if (title.includes("feature") || title.includes("request") || body.includes("wunsch")) {
              labels.push("enhancement");
            }
            if (title.includes("documentation") || title.includes("docs") || body.includes("doku")) {
              labels.push("documentation");
            }
            if (title.includes("oci") || body.includes("oracle")) {
              labels.push("oci");
            }
            
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labels
              });
            }
